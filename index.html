<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sweet Iza</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
    <link rel="shortcut icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="logo.png" alt="Sweet Iza" class="avatar-logo" onerror="this.src='https://placehold.co/250x250?text=🍰+Sweet+Iza'">
        </div>

        <!-- Subtítulo com coração no lugar dos brilhos -->
        <p class="tagline"><i class="fas fa-heart" style="color: #f6b7d4; font-size: 0.8rem;"></i> Doces artesanais com amor <i class="fas fa-heart" style="color: #f6b7d4; font-size: 0.8rem;"></i></p>

        <!-- Links principais -->
        <div class="links-container">
            <!-- Instagram -->
            <a href="https://www.instagram.com/sweet.izaaaa?igsh=NDllcG1yOGY2dGg=" class="link-card" id="instagram-link" target="_blank" rel="noopener noreferrer">
                <div class="icon-bg"><i class="fab fa-instagram"></i></div>
                <div class="link-info">
                    <span class="platform">Instagram</span>
                    <span class="handle">@sweet.izaaaa</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/5511925324479" class="link-card" id="whatsapp-link" target="_blank" rel="noopener noreferrer">
                <div class="icon-bg"><i class="fab fa-whatsapp"></i></div>
                <div class="link-info">
                    <span class="platform">WhatsApp</span>
                    <span class="handle">(11) 92532-4479</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- iFood -->
            <a href="#" class="link-card" id="ifood-link" target="_blank" rel="noopener noreferrer">
                <div class="icon-bg ifood-icon icon-img">
                    <img src="ifood.png" alt="iFood" class="platform-icon" onerror="this.src='https://placehold.co/48x48?text=🍽️'">
                </div>
                <div class="link-info">
                    <span class="platform">iFood</span>
                    <span class="handle">Em breve no delivery</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- 99 Food -->
            <a href="#" class="link-card" id="ninenine-link" target="_blank" rel="noopener noreferrer">
                <div class="icon-bg ninenine-icon icon-img">
                    <img src="99.png" alt="99 Food" class="platform-icon" onerror="this.src='https://placehold.co/48x48?text=99'">
                </div>
                <div class="link-info">
                    <span class="platform">99 Food</span>
                    <span class="handle">Em breve no delivery</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <!-- Keeta -->
            <a href="#" class="link-card" id="keeta-link" target="_blank" rel="noopener noreferrer">
                <div class="icon-bg keeta-icon icon-img">
                    <img src="keeta.png" alt="Keeta" class="platform-icon" onerror="this.src='https://placehold.co/48x48?text=Keeta'">
                </div>
                <div class="link-info">
                    <span class="platform">Keeta</span>
                    <span class="handle">Em breve no delivery</span>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>
        </div>

        <footer class="footer">
            <p><i class="fas fa-candy-cane" style="color: #1f2440;"></i> Doces que aquecem o coração <i class="fas fa-candy-cane" style="color: #1f2440;"></i></p>
            <p class="footer-small"><i class="fas fa-heart" style="color: #1f2440; font-size: 0.65rem;"></i> Atendimento via WhatsApp e Instagram <i class="fas fa-heart" style="color: #1f2440; font-size: 0.65rem;"></i></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
